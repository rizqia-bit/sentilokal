<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentiment Analysis Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }
      h1, h2 {
        margin-top: 0;
        color: #f8fafc;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #334155;
      }
      .tag {
        display: inline-block;
        padding: 6px 10px;
        margin: 4px;
        background: #1d4ed8;
        border-radius: 999px;
        color: white;
      }
      canvas {
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sentiment Analysis Report</h1>
      <p>URL: https://tokopedia.com/test</p>
      <p>Total review: 10</p>
      <p>Rata-rata rating: 3.5</p>
    </div>

    <div class="card">
      <h2>Ringkasan Sentimen</h2>
      <table>
        <thead>
          <tr>
            <th>Sentimen</th>
            <th>Persentase</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>Positif</td><td>50%</td></tr>
          <tr><td>Netral</td><td>20%</td></tr>
          <tr><td>Negatif</td><td>30%</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2>Chart Sentimen</h2>
      <canvas id="sentimentChart"></canvas>
    </div>

    <div class="card">
      <h2>Kata Kunci</h2>
      <div><span class="tag">cepat</span><span class="tag">sesuai</span><span class="tag">barang</span><span class="tag">gak</span><span class="tag">produk</span><span class="tag">pengiriman</span><span class="tag">kualitas</span><span class="tag">oke</span><span class="tag">harga</span><span class="tag">pengemasan</span></div>
    </div>

    <script>
      const ctx = document.getElementById('sentimentChart');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Positif', 'Netral', 'Negatif'],
          datasets: [{
            label: 'Persentase',
            data: [50, 20, 30],
            backgroundColor: ['#22c55e', '#f59e0b', '#ef4444']
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, max: 100 } }
        }
      });
    </script>
  </body>
</html>
